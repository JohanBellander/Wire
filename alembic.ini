[alembic]
# Script location: package-relative so the migrations ship inside the
# wire package and are reachable in the Docker image.
script_location = src/wire/db/migrations

# sqlalchemy URL is set dynamically in env.py based on WIRE_DB_PATH /
# the engine factory. Leaving this empty intentionally.
sqlalchemy.url =

# Versions go in src/wire/db/migrations/versions/
prepend_sys_path = .
path_separator = os

# File-format for revision filenames: yyyy-mm-dd-revid_slug.py
file_template = %%(year)d-%%(month).2d-%%(day).2d-%%(rev)s_%%(slug)s
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
